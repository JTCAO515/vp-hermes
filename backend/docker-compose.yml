version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: visepanda
      POSTGRES_PASSWORD: visepanda
      POSTGRES_DB: visepanda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visepanda"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: "postgresql://visepanda:visepanda@db:5432/visepanda"
      JWT_SECRET: "vp-trae-production-change-me-2026"
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
